  <text x="432" y="276" fill="#e6edf3" font-size="11">GLM-4.5</text>
  <text x="644" y="276" fill="#6e7681" font-size="9">&#x25BE;</text>

  <!-- ===== 模型参数 Section ===== -->
  <rect x="272" y="328" width="900" height="182" rx="8" fill="rgba(33,40,59,0.6)" stroke="#2d3548" stroke-width="1"/>
  <text x="290" y="354" fill="#e6edf3" font-size="13" font-weight="bold">模型参数</text>
  <text x="290" y="370" fill="#6e7681" font-size="10">全局默认模型推理参数，可在会话中覆盖</text>
  <line x1="290" y1="378" x2="1154" y2="378" stroke="#2d3548" stroke-width="0.5"/>

  <!-- 温度 slider 0.7 -->

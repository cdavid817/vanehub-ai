  <rect x="420" y="421" width="160" height="26" rx="6" fill="#0d1117" stroke="#2d3548" stroke-width="1"/>
  <text x="432" y="438" fill="#e6edf3" font-size="11">4096</text>

  <!-- 上下文窗口 -->
  <text x="630" y="434" fill="#8b949e" font-size="11">上下文窗口</text>
  <rect x="740" y="421" width="160" height="26" rx="6" fill="#0d1117" stroke="#2d3548" stroke-width="1"/>
  <text x="752" y="438" fill="#e6edf3" font-size="11">8192</text>

  <!-- Top P slider 0.9 -->
  <text x="290" y="472" fill="#8b949e" font-size="11">Top P</text>
  <rect x="420" y="461" width="280" height="20" rx="6" fill="#0d1117" stroke="#2d3548" stroke-width="0.5"/>
  <rect x="424" y="470" width="272" height="3" rx="1.5" fill="#2d3548"/>
  <rect x="424" y="470" width="245" height="3" rx="1.5" fill="#5b9cf5"/>
  <circle cx="669" cy="471.5" r="6" fill="#5b9cf5" stroke="#0d1117" stroke-width="2"/>
  <text x="712" y="474" fill="#e6edf3" font-size="11" font-weight="bold">0.9</text>

  <!-- ===== 数据与存储 Section ===== -->
  <rect x="272" y="522" width="900" height="170" rx="8" fill="rgba(33,40,59,0.6)" stroke="#2d3548" stroke-width="1"/>
  <text x="290" y="548" fill="#e6edf3" font-size="13" font-weight="bold">数据与存储</text>
  <text x="290" y="564" fill="#6e7681" font-size="10">数据存储路径与缓存管理</text>
  <line x1="290" y1="572" x2="1154" y2="572" stroke="#2d3548" stroke-width="0.5"/>

  <!-- 数据目录 -->
  <text x="290" y="594" fill="#8b949e" font-size="11">数据目录</text>
  <rect x="420" y="581" width="480" height="26" rx="6" fill="#0d1117" stroke="#2d3548" stroke-width="1"/>
  <text x="432" y="598" fill="#e6edf3" font-size="11">C:\Users\c00606997\.vanehub-ai\data</text>
  <rect x="910" y="581" width="52" height="26" rx="4" fill="#2d3548" stroke="#3d4a5c" stroke-width="1"/>
  <text x="936" y="598" fill="#8b949e" font-size="10" text-anchor="middle">浏览</text>

  <!-- 缓存大小 + 清理缓存 -->

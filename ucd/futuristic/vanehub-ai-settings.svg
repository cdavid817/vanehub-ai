<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="Inter, Microsoft YaHei, monospace">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="navGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#1a2030"/>
    </linearGradient>
    <linearGradient id="btnPrimaryGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6ba8f7"/>
      <stop offset="100%" stop-color="#4a8fe0"/>
    </linearGradient>
    <linearGradient id="sliderTrack" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5b9cf5"/>
      <stop offset="100%" stop-color="#5b9cf5"/>
    </linearGradient>
    <filter id="shadowDeep">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <filter id="glowBlue">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#5b9cf5" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- 全局背景 -->
  <rect width="1200" height="820" fill="url(#bgGrad)"/>

  <!-- ==================== 顶部导航栏 ==================== -->
  <rect x="0" y="0" width="1200" height="48" fill="url(#navGrad)" filter="url(#shadow)"/>
  <!-- 顶部蓝色高亮线 -->
  <rect x="0" y="0" width="1200" height="2" fill="#5b9cf5" opacity="0.6"/>

  <!-- Logo -->
  <rect x="16" y="12" width="24" height="24" rx="4" fill="none" stroke="#5b9cf5" stroke-width="1.5"/>
  <path d="M22 18 L28 18 L28 24 L22 24 Z" fill="#5b9cf5" opacity="0.3"/>
  <path d="M24 20 L26 20 L26 22 L24 22 Z" fill="#5b9cf5"/>
  <text x="48" y="29" fill="#e6edf3" font-size="14" font-weight="bold">VaneHub AI</text>

  <!-- 面包屑分隔 -->
  <text x="148" y="29" fill="#6e7681" font-size="12">/</text>
  <text x="162" y="29" fill="#8b949e" font-size="13">设置</text>

  <!-- 全局搜索 -->
  <rect x="700" y="11" width="240" height="28" rx="6" fill="#0d1117" stroke="#2d3548" stroke-width="1"/>
  <text x="714" y="29" fill="#6e7681" font-size="11">搜索设置项...</text>
  <rect x="910" y="16" width="20" height="18" rx="3" fill="#2d3548"/>
  <text x="920" y="29" fill="#8b949e" font-size="9" text-anchor="middle">Q</text>

  <!-- 返回按钮 -->
  <rect x="1124" y="11" width="60" height="28" rx="4" fill="#2d3548" stroke="#3d4a5c" stroke-width="1"/>
  <text x="1154" y="29" fill="#8b949e" font-size="11" text-anchor="middle">返回</text>

  <!-- ==================== 左侧设置导航 ==================== -->
  <rect x="12" y="58" width="232" height="708" rx="12" fill="rgba(22,27,34,0.85)" stroke="#2d3548" stroke-width="1" filter="url(#shadow)"/>

  <!-- 导航标题 -->
  <text x="28" y="86" fill="#e6edf3" font-size="13" font-weight="bold">系统设置</text>
  <line x1="24" y1="96" x2="232" y2="96" stroke="#2d3548" stroke-width="1"/>

  <!-- 1. 基础配置 (选中态 - 带左侧指示条) -->
  <rect x="20" y="104" width="216" height="36" rx="6" fill="rgba(91,156,245,0.1)"/>
  <rect x="20" y="104" width="3" height="36" rx="1.5" fill="#5b9cf5"/>
  <!-- 图标: 齿轮 -->
  <circle cx="42" cy="122" r="6" fill="none" stroke="#5b9cf5" stroke-width="1.5"/>
  <circle cx="42" cy="122" r="2" fill="#5b9cf5"/>
  <text x="56" y="126" fill="#5b9cf5" font-size="12" font-weight="bold">基础配置</text>
  <text x="218" y="126" fill="#5b9cf5" font-size="10" text-anchor="end">&#x25B8;</text>

  <!-- 2. 供应商管理 -->
  <rect x="20" y="146" width="216" height="36" rx="6" fill="transparent"/>
  <rect x="36" y="157" width="12" height="12" rx="2" fill="none" stroke="#8b949e" stroke-width="1.2"/>
  <rect x="39" y="160" width="6" height="6" rx="1" fill="#8b949e" opacity="0.4"/>
  <text x="56" y="168" fill="#8b949e" font-size="12">供应商管理</text>
  <rect x="198" y="155" width="18" height="16" rx="8" fill="#f85149"/>
  <text x="207" y="166" fill="#ffffff" font-size="9" text-anchor="middle" font-weight="bold">3</text>

  <!-- 3. SDK依赖 -->
  <rect x="20" y="188" width="216" height="36" rx="6" fill="transparent"/>
  <rect x="36" y="199" width="12" height="12" rx="2" fill="none" stroke="#8b949e" stroke-width="1.2"/>
  <path d="M39 202 L45 202 L45 208 L39 208 Z" fill="#8b949e" opacity="0.4"/>
  <text x="56" y="210" fill="#8b949e" font-size="12">SDK依赖</text>
  <rect x="198" y="197" width="18" height="16" rx="8" fill="#f85149"/>
  <text x="207" y="208" fill="#ffffff" font-size="9" text-anchor="middle" font-weight="bold">5</text>

  <!-- 4. MCP服务器 -->
  <rect x="20" y="230" width="216" height="36" rx="6" fill="transparent"/>
  <circle cx="42" cy="248" r="6" fill="none" stroke="#8b949e" stroke-width="1.2"/>
  <circle cx="42" cy="248" r="2.5" fill="#8b949e" opacity="0.4"/>
  <text x="56" y="252" fill="#8b949e" font-size="12">MCP服务器</text>
  <rect x="198" y="239" width="18" height="16" rx="8" fill="#3fb950"/>
  <text x="207" y="250" fill="#ffffff" font-size="9" text-anchor="middle" font-weight="bold">2</text>

  <!-- 5. Agents -->
  <rect x="20" y="272" width="216" height="36" rx="6" fill="transparent"/>
  <path d="M36 284 L48 284 L48 292 L36 292 Z" fill="none" stroke="#8b949e" stroke-width="1.2" rx="2"/>
  <circle cx="42" cy="288" r="3" fill="#8b949e" opacity="0.4"/>
  <text x="56" y="294" fill="#8b949e" font-size="12">Agents</text>
  <rect x="198" y="281" width="18" height="16" rx="8" fill="#f85149"/>
  <text x="207" y="292" fill="#ffffff" font-size="9" text-anchor="middle" font-weight="bold">4</text>

  <!-- 6. Skills -->
  <rect x="20" y="314" width="216" height="36" rx="6" fill="transparent"/>
  <path d="M42 322 L46 330 L38 330 Z" fill="none" stroke="#8b949e" stroke-width="1.2"/>
  <text x="56" y="336" fill="#8b949e" font-size="12">Skills</text>
  <rect x="198" y="323" width="18" height="16" rx="8" fill="#f85149"/>
  <text x="207" y="334" fill="#ffffff" font-size="9" text-anchor="middle" font-weight="bold">8</text>

  <!-- 分隔线 -->
  <line x1="24" y1="364" x2="232" y2="364" stroke="#2d3548" stroke-width="1"/>

  <!-- 快捷操作 -->
  <text x="28" y="386" fill="#8b949e" font-size="11" font-weight="bold">快捷操作</text>

  <!-- 重置所有设置 -->
  <rect x="20" y="396" width="216" height="30" rx="4" fill="rgba(248,81,73,0.08)" stroke="rgba(248,81,73,0.25)" stroke-width="1"/>
  <text x="32" y="415" fill="#f85149" font-size="11">重置所有设置</text>

  <!-- 导出当前配置 -->
  <rect x="20" y="432" width="216" height="30" rx="4" fill="rgba(91,156,245,0.06)" stroke="rgba(91,156,245,0.2)" stroke-width="1"/>
  <text x="32" y="451" fill="#5b9cf5" font-size="11">导出当前配置</text>

  <!-- 导入配置文件 -->
  <rect x="20" y="468" width="216" height="30" rx="4" fill="rgba(91,156,245,0.06)" stroke="rgba(91,156,245,0.2)" stroke-width="1"/>
  <text x="32" y="487" fill="#5b9cf5" font-size="11">导入配置文件</text>

  <!-- 版本信息 -->
  <rect x="20" y="714" width="216" height="40" rx="6" fill="rgba(13,17,23,0.6)" stroke="#2d3548" stroke-width="0.5"/>
  <text x="32" y="732" fill="#6e7681" font-size="10">VaneHub AI v0.1.0</text>
  <text x="32" y="746" fill="#6e7681" font-size="9">构建: 2026-07-14</text>


  <!-- 启动恢复 toggle on -->
  <text x="690" y="238" fill="#8b949e" font-size="11">启动恢复</text>
  <rect x="780" y="225" width="36" height="20" rx="10" fill="#5b9cf5"/>
  <circle cx="808" cy="235" r="7" fill="#ffffff"/>
  <text x="824" y="239" fill="#6e7681" font-size="9">启动时恢复上次会话</text>

  <!-- 默认模型 -->

  <rect x="256" y="58" width="932" height="708" rx="12" fill="rgba(22,27,34,0.85)" stroke="#2d3548" stroke-width="1" filter="url(#shadow)"/>

  <!-- 面包屑 -->
  <text x="276" y="84" fill="#6e7681" font-size="11">设置</text>
  <text x="298" y="84" fill="#6e7681" font-size="11">/</text>
  <text x="308" y="84" fill="#e6edf3" font-size="11" font-weight="bold">基础配置</text>


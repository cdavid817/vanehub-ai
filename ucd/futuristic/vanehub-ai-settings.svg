  <rect x="272" y="98" width="900" height="218" rx="8" fill="rgba(33,40,59,0.6)" stroke="#2d3548" stroke-width="1"/>
  <!-- Section header -->
  <text x="290" y="124" fill="#e6edf3" font-size="13" font-weight="bold">通用设置</text>
  <text x="290" y="140" fill="#6e7681" font-size="10">应用程序的基础参数与行为配置</text>
  <line x1="290" y1="148" x2="1154" y2="148" stroke="#2d3548" stroke-width="0.5"/>

  <!-- 应用名称 -->
  <text x="290" y="170" fill="#8b949e" font-size="11">应用名称</text>
  <rect x="420" y="157" width="240" height="26" rx="6" fill="#0d1117" stroke="#2d3548" stroke-width="1"/>
  <text x="432" y="174" fill="#e6edf3" font-size="11">VaneHub AI</text>

  <!-- 应用语言 -->
  <text x="690" y="170" fill="#8b949e" font-size="11">应用语言</text>
  <rect x="780" y="157" width="160" height="26" rx="6" fill="#0d1117" stroke="#2d3548" stroke-width="1"/>
  <text x="792" y="174" fill="#e6edf3" font-size="11">简体中文</text>
  <text x="924" y="174" fill="#6e7681" font-size="9">&#x25BE;</text>


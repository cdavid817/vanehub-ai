  <rect x="420" y="389" width="280" height="20" rx="6" fill="#0d1117" stroke="#2d3548" stroke-width="0.5"/>
  <rect x="424" y="398" width="272" height="3" rx="1.5" fill="#2d3548"/>
  <rect x="424" y="398" width="190" height="3" rx="1.5" fill="#5b9cf5"/>
  <circle cx="614" cy="399.5" r="6" fill="#5b9cf5" stroke="#0d1117" stroke-width="2"/>
  <text x="712" y="402" fill="#e6edf3" font-size="11" font-weight="bold">0.7</text>

  <!-- 最大输出Token -->

  <text x="456" y="208" fill="#8b949e" font-size="10" text-anchor="middle">深色</text>
  <!-- 浅色 active -->
  <rect x="498" y="191" width="72" height="26" rx="4" fill="#5b9cf5" filter="url(#glowBlue)"/>
  <text x="534" y="208" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">浅色</text>
  <rect x="576" y="191" width="72" height="26" rx="4" fill="#2d3548" stroke="#3d4a5c" stroke-width="1"/>
  <text x="612" y="208" fill="#8b949e" font-size="10" text-anchor="middle">跟随系统</text>


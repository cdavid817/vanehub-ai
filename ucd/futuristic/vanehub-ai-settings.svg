  <text x="420" y="628" fill="#e6edf3" font-size="11" font-weight="bold">256 MB</text>
  <rect x="490" y="615" width="68" height="26" rx="4" fill="rgba(248,81,73,0.12)" stroke="rgba(248,81,73,0.35)" stroke-width="1"/>
  <text x="524" y="632" fill="#f85149" font-size="10" text-anchor="middle">清理缓存</text>

  <!-- 日志级别 -->
  <text x="620" y="628" fill="#8b949e" font-size="11">日志级别</text>
  <rect x="710" y="615" width="120" height="26" rx="6" fill="#0d1117" stroke="#2d3548" stroke-width="1"/>
  <text x="722" y="632" fill="#e6edf3" font-size="11">INFO</text>
  <text x="814" y="632" fill="#6e7681" font-size="9">&#x25BE;</text>

  <!-- 历史保留 -->
  <text x="870" y="628" fill="#8b949e" font-size="11">历史保留</text>
  <rect x="960" y="615" width="80" height="26" rx="6" fill="#0d1117" stroke="#2d3548" stroke-width="1"/>
  <text x="972" y="632" fill="#e6edf3" font-size="11">30天</text>

  <!-- ===== 底部操作栏 ===== -->
  <rect x="272" y="706" width="900" height="48" rx="8" fill="rgba(22,27,34,0.7)" stroke="#2d3548" stroke-width="1"/>

  <!-- 自动保存提示 -->
  <circle cx="290" cy="730" r="3" fill="#3fb950"/>
  <text x="298" y="734" fill="#6e7681" font-size="10">已启用自动保存</text>

  <!-- 重置默认按钮 -->
  <rect x="992" y="716" width="80" height="28" rx="4" fill="#2d3548" stroke="#3d4a5c" stroke-width="1"/>
  <text x="1032" y="734" fill="#8b949e" font-size="11" text-anchor="middle">重置默认</text>

  <!-- 保存按钮 (primary) -->
  <rect x="1082" y="716" width="80" height="28" rx="4" fill="url(#btnPrimaryGrad)" filter="url(#glowBlue)"/>
  <text x="1122" y="734" fill="#ffffff" font-size="11" text-anchor="middle" font-weight="bold">保存</text>

  <!-- ==================== 底部状态栏 ==================== -->
  <rect x="0" y="792" width="1200" height="28" fill="#0d1117" stroke="#2d3548" stroke-width="0.5"/>
  <circle cx="16" cy="806" r="3.5" fill="#3fb950"/>
  <text x="26" y="810" fill="#8b949e" font-size="10">设置已同步</text>
  <line x1="104" y1="798" x2="104" y2="814" stroke="#2d3548" stroke-width="1"/>
  <text x="114" y="810" fill="#6e7681" font-size="10">配置版本: 1</text>
</svg>

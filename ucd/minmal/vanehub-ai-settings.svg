<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="Arial, Helvetica, &quot;PingFang SC&quot;, sans-serif">
  <!-- 全局背景 -->

name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint:ci

      - name: TypeScript and Vite build
        run: npm run build

      - name: Coverage policy regression tests
        run: npm run coverage:policy:test

      - name: Vitest with coverage
        run: npm run test:coverage

      - name: Enforce frontend coverage policy
        run: npm run coverage:check:frontend

      - name: Upload frontend coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-coverage-${{ github.run_id }}
          path: coverage/frontend/
          if-no-files-found: warn
          retention-days: 14

  contracts:
    name: Contracts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Vitest contract checks
        run: npm run contracts:check

  openspec:
    name: OpenSpec
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: Validate main specifications
        run: npx --yes @fission-ai/openspec@1.6.0 validate --specs --strict

      - name: Validate active changes
        shell: bash
        run: |
          shopt -s nullglob
          for change_dir in openspec/changes/*/; do
            change_name="$(basename "$change_dir")"
            if [[ "$change_name" == "archive" ]]; then
              continue
            fi
            npx --yes @fission-ai/openspec@1.6.0 validate "$change_name" --strict
          done

  documentation:
    name: Documentation
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable

      - name: Restore documentation tool and Rust caches
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/mdbook.exe
            .docs-target
          key: documentation-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock', 'docs/toolchain.json') }}
          restore-keys: |
            documentation-${{ runner.os }}-

      - name: Install npm dependencies
        run: npm ci

      - name: Install pinned mdBook
        shell: pwsh
        run: |
          $expectedVersion = (Get-Content docs/toolchain.json | ConvertFrom-Json).mdbook
          $installedVersion = if (Get-Command mdbook -ErrorAction SilentlyContinue) {
            mdbook --version
          } else {
            ""
          }
          if ($installedVersion -notmatch [regex]::Escape($expectedVersion)) {
            cargo install mdbook --version $expectedVersion --locked --force
          }

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Check documentation sources
        run: |
          npm run docs:check
          npm run docs:test

      - name: Verify documentation screenshots
        run: npm run docs:screenshots:check

      - name: Build documentation site
        run: npm run docs:build

      - name: Confirm documentation build is read-only
        run: git diff --exit-code

      - name: Upload documentation site
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: documentation-site-${{ github.run_id }}
          path: .docs-build/
          if-no-files-found: error
          retention-days: 14

  rust:
    name: Rust
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Linux prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            mold \
            patchelf \
            wget

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: rustfmt, clippy

      - name: Verify Linux fast linker
        run: |
          clang --version
          mold --version

      - name: Rust fmt
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: Rust check
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Rust clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  native-coverage:
    name: Native Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Linux prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            mold \
            patchelf \
            wget

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: llvm-tools-preview

      - name: Verify Linux fast linker
        run: |
          clang --version
          mold --version

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --version 0.8.7 --locked

      - name: Generate native coverage
        run: npm run coverage:native

      - name: Enforce native coverage policy
        run: npm run coverage:check:native

      - name: Upload native coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-coverage-${{ github.run_id }}
          path: coverage/native/
          if-no-files-found: warn
          retention-days: 14

  native-platform-check:
    name: Native Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable

      - name: Verify Windows LLD
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $rustLld = Join-Path (rustc --print sysroot) "lib/rustlib/x86_64-pc-windows-msvc/bin/rust-lld.exe"
          if (-not (Test-Path -LiteralPath $rustLld)) {
            throw "Rust toolchain LLD was not found at $rustLld"
          }
          Write-Output "Using Rust toolchain LLD at $rustLld"

      - name: Native cargo build
        run: cargo build --manifest-path src-tauri/Cargo.toml

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14

name: Package Desktop Apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release version
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Validate synchronized project versions
        run: npm run version:check -- ${{ github.ref_type == 'tag' && github.ref_name || '' }}

  package:
    name: Package (${{ matrix.platform }}-${{ matrix.arch }})
    needs: validate
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    environment:
      name: ${{ github.ref_type == 'tag' && 'release' || 'build-preview' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            arch: x64
            runner: windows-latest
            rust_target: x86_64-pc-windows-msvc
            npm_script: package:windows:x64
          - platform: macos
            arch: arm64
            runner: macos-14
            rust_target: aarch64-apple-darwin
            npm_script: package:macos:arm64
          - platform: linux
            arch: x64
            runner: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            npm_script: package:linux:x64
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Install Linux prerequisites
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            wget

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install npm dependencies
        run: npm ci

      - name: Build package
        run: npm run ${{ matrix.npm_script }}

      - name: Upload package artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: VaneHub-AI-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/**
            src-tauri/target/release/bundle/**
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub release
    if: github.ref_type == 'tag'
    needs:
      - validate
      - package
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: release
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Download packages
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: release-assets/packages
          merge-multiple: true

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: spdx-json
          output-file: release-assets/vanehub-ai-sbom.spdx.json
          upload-artifact: false

      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          find release-assets -type f ! -name SHA256SUMS -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            > release-assets/SHA256SUMS

      - name: Attest package provenance
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: release-assets/packages/**

      - name: Attest SBOM
        uses: actions/attest-sbom@51e74621a501c89df81fc1391c5a8f4cfc9fab2f # v3
        with:
          subject-path: release-assets/packages/**
          sbom-path: release-assets/vanehub-ai-sbom.spdx.json

      - name: Publish release with generated notes
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mapfile -d '' assets < <(find release-assets -type f -print0)
          gh release create "${GITHUB_REF_NAME}" \
            "${assets[@]}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "VaneHub AI ${GITHUB_REF_NAME}" \
            --generate-notes \
            --verify-tag
